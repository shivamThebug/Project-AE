# ╔═══════════════════════════════════════╗
# ║       GLASSMORPHIC WAYBAR KITTY       ║
# ╚═══════════════════════════════════════╝

# ─── FONTS & ICON CONFIGURATION ──────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ─── PERFORMANCE & RESPONSIVENESS ────────────────────────────────
input_delay 0
sync_to_monitor yes
repaint_delay 8
touch_scroll_multiplier 10.0
wheel_scroll_min_lines 1

# ─── GLASSMORPHIC CANVAS SURFACES ─────────────────────────────────
# Flipped to a sleek dark slate base so white/light backgrounds don't blind you
background            #111622
foreground            #e2e8f0
selection_background  #3b4252
selection_foreground  #e2e8f0

# Keep your low opacity and heavy blur — let Hyprland do the heavy lifting
background_opacity    0.35
background_blur       11

# High visibility cursor
cursor                #e2e8f0
cursor_text_color     #111622
cursor_shape          block 
shell_integration     no-cursor

# ─── CURSOR TRAIL ANIMATIONS ──────────────────────────────────────
cursor_trail                  4
cursor_trail_decay            0.12 0.35
cursor_trail_start_threshold  0

# ─── WINDOW & TAB DECORATIONS ─────────────────────────────────────
window_padding_width  16
remember_window_size  no
initial_window_width  950
initial_window_height 550
hide_window_decorations yes
confirm_os_window_close 0
inactive_text_alpha   0.7

# Borders keep that clean frost frame look
active_border_color   #4a5568
inactive_border_color #1a202c

# Tab bar mimicking the styled button elements
tab_bar_style         fade
tab_activity_symbol   ●
active_tab_background   #e2e8f0
active_tab_foreground   #111622
inactive_tab_background #1a202c
inactive_tab_foreground #718096

# ─── PRODUCTIVITY SHORTCUTS ───────────────────────────────────────
map ctrl+shift+e kitten hints --type url --program -
map ctrl+shift+p kitten hints --type path --program @

# ─── THE 16-COLOR GLASSMATRIX (Adjusted for perfect dark-on-light read) ───
color0  #111622
color8  #4a5568
color1  #ff5a5a
color9  #ff6b6b
color2  #81c784
color10 #a5d6a7
color3  #ffd479
color11 #ffe082
color4  #64b5f6
color12 #90caf9
color5  #ba68c8
color13 #ce93d8
color6  #4db6ac
color14 #80cbc4
color7  #e2e8f0
color15 #ffffff