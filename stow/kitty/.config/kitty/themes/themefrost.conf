
# ==========================================
# 1. GLASSMORPHISM WINDOW BLUR & OPACITY
# ==========================================
background_opacity         0.72
background_blur            24
dynamic_background_opacity yes

# ==========================================
# 2. WINDOW FRAME & BORDERS
# ==========================================
window_border_width        1.5pt
active_border_color        #ffffff
inactive_border_color      #ffffff
window_margin_width        10

# ==========================================
# 3. TYPOGRAPHY & FONTS
# ==========================================
font_family                JetBrainsMono Nerd Font
bold_font                  auto
italic_font                auto
bold_italic_font           auto
font_size                  12.5

# ==========================================
# 4. COLOR SCHEME (Onyx Glass Theme)
# ==========================================
background                 #141419
foreground                 #ffffff

# Black / Frosted Grey
color0                     #1a1a2e
color8                     #5a5a6e

# Red / Critical Error (Matches your battery.critical style)
color1                     #ff5a5a
color9                     #ff7373

# Green / Accent
color2                     #88bda4
color10                    #a3d1bc

# Yellow / Warning State (Matches your battery.warning color #FFD479)
color3                     #ffd479
color11                    #ffe19c

# Blue / System Info
color4                     #659287
color12                    #7dafa2

# Magenta / Creative Accent
color5                     #b1d3b9
color13                    #cbe8d2

# Cyan / Vibrant Accent
color6                     #e6f2dd
color14                    #f0f9eb

# White / Active Focus Text
color7                     #eae8ea
color15                    #ffffff

# ==========================================
# 5. CURSOR & TABS
# ==========================================
cursor                     #ffffff
cursor_text_color          #141419

active_tab_foreground      #1a1a2e
active_tab_background      #ffffff
active_tab_font_style      bold
inactive_tab_foreground    #ffffff
inactive_tab_background    #141419