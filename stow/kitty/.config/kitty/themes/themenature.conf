# ==========================================
# 1. PREMIUM GLASS TEXTURE & TRANSITIONAL BLUR
# ==========================================
# Gives it a frosted, smoky obsidian pane aesthetic
background_opacity         0.78
background_blur            28
dynamic_background_opacity yes

# Thick, structured framing that mimics your Waybar container borders
window_border_width        2.5pt
active_border_color        #346739
inactive_border_color      #79AE6F
window_margin_width        12

# ==========================================
# 2. TYPOGRAPHY & FONTS
# ==========================================
font_family                JetBrainsMono Nerd Font
bold_font                  auto
italic_font                auto
bold_italic_font           auto
font_size                  12.5

# ==========================================
# 3. COLOR SCHEME (Frosted Dark Moss Edition)
# ==========================================
# Deep charcoal-moss base to ground the transparency beautifully
background                 #141a16
# High-contrast cream text for elite legibility over blurred layers
foreground                 #F2EDC2

# Black / Shadow Tones
color0                     #121212
color8                     #1a1a2e

# Red / Accent Alerts (Matches your battery.critical #C1440E)
color1                     #C1440E
color9                     #E05D26

# Green / Earth Accents (Matches your #clock / mid-green module pill #79AE6F)
color2                     #79AE6F
color10                    #94CA8A

# Yellow / Warm Warning Alerts (Matches your battery.warning #C1440E)
color3                     #C1440E
color11                    #F1E6D0

# Blue / Dark Forest Highlights
color4                     #346739
color12                    #46854d

# Magenta / Soft Earth Accent
color5                     #F1E6D0
color13                    #FFFFFF

# Cyan / Vibrant Cream Fill
color6                     #F2EDC2
color14                    #FFFBC9

# White / Soft Light Text
color7                     #EAE8EA
color15                    #FFFFFF

# ==========================================
# 4. INTERACTIVE ACCENTS (CURSOR & TABS)
# ==========================================
# Your cursor behaves like an active laser using the mid-green color
cursor                     #79AE6F
cursor_text_color          #141a16

active_tab_foreground      #141a16
active_tab_background      #79AE6F
active_tab_font_style      bold
inactive_tab_foreground    #F2EDC2
inactive_tab_background    #346739