/* --- Global Settings --- */
* {
    border: none;
    border-radius: 16px; /* Slightly tightened for a crisper silhouette */
    font-family: "SF Pro Display", "JetBrainsMono Nerd Font";
    font-size: 13px;
    margin: 0;
    min-height: 0;
    padding: 0;
}

window#waybar {
    background: transparent;
    margin: 0 100px;
}

/* --- Tooltips --- */
tooltip {
    background: #0d0d16;
    border: 1px solid #00f2fe;
    border-radius: 12px;
}

tooltip label {
    color: #00f2fe;
    text-shadow: 0 0 4px rgba(0, 242, 254, 0.4);
    padding: 6px 12px;
}

/* --- Workspaces Module --- */
#workspaces {
    background: #09090f;
    margin: 0;
    padding: 4px;
    border: 1px solid #ff007f;
    border-radius: 16px;
}

#workspaces button {
    padding: 0 12px;
    margin: 0 2px;
    border-radius: 12px;
    background: transparent;
    color: rgba(255, 255, 255, 0.4);
    font-weight: 500;
    transition: all 180ms ease-in-out;
}

#workspaces button:hover {
    background: rgba(255, 0, 127, 0.1);
    color: #ff007f;
    text-shadow: 0 0 4px rgba(255, 0, 127, 0.5);
}

#workspaces button.active {
    min-width: 40px;
    border-radius: 10px;
    background: #00f2fe;
    color: #050510;
    font-weight: 700;
}

/* --- Clock Module --- */
#clock {
    font-weight: 600;
    background: #09090f;
    border: 1px solid #00f2fe;
    border-radius: 12px;
    color: #00f2fe;
    text-shadow: 0 0 4px rgba(0, 242, 254, 0.4);
    padding: 3px 16px;
}

/* --- Container Styling --- */
.modules-center {
    background: #09090f;
    color: #ffffff;
    margin: 0;
    padding: 4px;
    border: 1px solid rgba(255, 0, 127, 0.4);
    border-radius: 16px;
}

.modules-right {
    background: #09090f;
    margin: 0;
    padding: 4px;
    border: 1px solid rgba(0, 242, 254, 0.4);
    border-radius: 16px;
}

/* --- Isolated Left Apps Box Group --- */
#apps {
    background: #09090f;
    margin: 0;
    padding: 4px;
    border: 1px solid rgba(144, 19, 254, 0.5);
    border-radius: 16px;
}

/* --- Right Side Modules & Inner Left App Button --- */
#pulseaudio,
#network,
#battery,
#custom-power,
#custom-app,
#apps #custom-app,
#backlight {
    font-weight: 600;
    background: #121220;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    color: #e0e0ff;
    padding: 3px 14px;
    margin: 0 2px;
}

/* Distinctive styling for Power Menu to stand out */
#custom-power {
    min-width: 10px;
    color: #ff0055;
    border: 1px solid rgba(255, 0, 85, 0.4);
    text-shadow: 0 0 4px rgba(255, 0, 85, 0.4);
}

/* --- Battery States --- */
#battery.warning {
    color: #ffb300;
    border: 1px solid rgba(255, 179, 0, 0.4);
    text-shadow: 0 0 4px rgba(255, 179, 0, 0.4);
}

#battery.critical {
    background: #2a0813;
    border: 1px solid #ff0055;
    color: #ff3377;
    text-shadow: 0 0 4px rgba(255, 0, 85, 0.5);
}